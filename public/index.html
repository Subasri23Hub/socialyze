<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Social Media Campaign Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .card {
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      border: 1px solid #4338ca;
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      max-width: 560px;
      width: 100%;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .subtitle { color: #a5b4fc; margin-bottom: 2rem; font-size: 0.95rem; }
    .btn {
      display: inline-block;
      background: #4f46e5;
      color: #fff;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      text-decoration: none;
      font-weight: 600;
      margin: 0.4rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #4338ca; }
    .btn.secondary { background: transparent; border: 1px solid #4f46e5; }
    .btn.secondary:hover { background: #1e1b4b; }
    .team { margin-top: 2rem; color: #6b7280; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 AI Campaign Generator</h1>
    <p class="subtitle">Powered by Google Gemini · Built by Sourcesys Technologies</p>

    <a href="http://localhost:8501" class="btn">Open Streamlit App</a>
    <a href="/health"              class="btn secondary">API Status</a>

    <p class="team">
      Team: Subasri B &nbsp;·&nbsp; Gautham Krishnan K &nbsp;·&nbsp;
      Ashwin D &nbsp;·&nbsp; Vinjarapu Ajay Kumar
    </p>
  </div>
</body>
</html>
